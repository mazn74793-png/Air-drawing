<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Drawing Pro | AI Vision</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية الفيديو واللوحة */
        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* مرآة */
            z-index: 1;
        }

        #canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1);
            touch-action: none;
        }

        /* واجهة المستخدم البرو */
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .status-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .status-card h2 { margin: 0; font-size: 18px; color: var(--primary); }
        .status-card p { margin: 5px 0 0; font-size: 12px; opacity: 0.8; }

        .controls-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
            pointer-events: auto;
        }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.9); }
        .btn-clear { border-color: var(--danger); color: var(--danger); }

        /* شاشة التحميل */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .loader {
            border: 4px solid var(--glass);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <p>جاري تشغيل الذكاء الاصطناعي...</p>
    </div>

    <div class="app-container">
        <div class="ui-overlay">
            <div class="status-card">
                <h2 id="mode-text">وضع الانتظار</h2>
                <p id="sub-text">ارفع إصبع السبابة للبدء</p>
            </div>
        </div>

        <div class="controls-bar">
            <button class="btn btn-clear" onclick="clearCanvas()">مسح اللوحة</button>
        </div>

        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading');
        const modeText = document.getElementById('mode-text');

        let isDrawing = false;
        let lastX = 0, lastY = 0;

        // ضبط الأبعاد بدقة للموبايل والتابلت
        function initCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            // إعدادات الفرشاة البرو
            canvasCtx.strokeStyle = '#00f2ff';
            canvasCtx.lineWidth = 6;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        function clearCanvas() {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        }

        function onResults(results) {
            // إخفاء شاشة التحميل عند أول استجابة
            if (loadingScreen.style.display !== 'none') {
                loadingScreen.style.display = 'none';
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // تعريف النقاط الأساسية
                const indexTip = landmarks[8];
                const indexBase = landmarks[5];
                const middleTip = landmarks[12];
                const thumbTip = landmarks[4];

                const x = indexTip.x * canvasElement.width;
                const y = indexTip.y * canvasElement.height;

                // المنطق البرو:
                // 1. مسح الشاشة (كف يد مفتوح بالكامل)
                if (indexTip.y < indexBase.y && middleTip.y < landmarks[9].y && landmarks[16].y < landmarks[13].y) {
                    clearCanvas();
                    modeText.innerText = "جاري المسح...";
                    modeText.style.color = "#ff4757";
                    isDrawing = false;
                }
                // 2. الرسم (إصبع السبابة مرفوع فقط)
                else if (indexTip.y < indexBase.y) {
                    modeText.innerText = "وضع الرسم ✎";
                    modeText.style.color = "#00f2ff";
                    
                    if (!isDrawing) {
                        isDrawing = true;
                        [lastX, lastY] = [x, y];
                    }

                    canvasCtx.beginPath();
                    canvasCtx.moveTo(lastX, lastY);
                    canvasCtx.lineTo(x, y);
                    canvasCtx.stroke();
                    [lastX, lastY] = [x, y];
                } 
                else {
                    modeText.innerText = "وضع الانتظار";
                    modeText.style.color = "#fff";
                    isDrawing = false;
                }
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        camera.start().catch(err => {
            alert("خطأ في تشغيل الكاميرا: " + err);
        });
    </script>
</body>
</html>
