<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Paint Ultra | Mazen Pro 🚀</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root { 
            --primary: #00f2ff; 
            --neon: #ff00ff; 
            --bg-dark: #050505;
        }

        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background: var(--bg-dark); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white; 
            user-select: none;
        }
        
        /* طبقة الكاميرا الخلفية */
        #webcam { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            z-index: 1; 
        }

        /* لوحة الرسم الأمامية */
        #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            z-index: 2; 
            transform: scaleX(-1); 
            touch-action: none; 
        }

        /* رسالة الترحيب "Hi Mazen" */
        #welcome-msg {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(3rem, 10vw, 6rem); 
            font-weight: 900; 
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary), 0 0 50px var(--primary); 
            z-index: 100;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        #welcome-msg.show { 
            transform: translate(-50%, -50%) scale(1); 
        }

        /* لوحة التحكم العلوية (Status) */
        .ui-panel {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10;
            background: rgba(0,0,0,0.75); 
            padding: 15px 25px; 
            border-radius: 20px;
            border-left: 5px solid var(--primary); 
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .thickness-label { 
            font-size: 13px; 
            font-weight: bold; 
            margin-top: 10px; 
            display: block; 
            opacity: 0.8;
        }

        .thickness-indicator {
            width: 160px; 
            height: 8px; 
            background: #222; 
            border-radius: 10px; 
            margin-top: 5px; 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #thickness-bar { 
            width: 50%; 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), #fff); 
            transition: 0.15s ease-out; 
        }

        /* شريط الأدوات السفلي */
        .toolbar {
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 10; 
            display: flex; 
            gap: 15px; 
            background: rgba(0,0,0,0.8);
            padding: 12px 25px; 
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
        }

        .btn-action {
            background: white; 
            color: black; 
            border: none; 
            padding: 10px 24px;
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,255,255,0.3); }
        .btn-action:active { transform: scale(0.9); }

        /* شاشة التحميل الذكية */
        #loading {
            position: fixed; 
            inset: 0; 
            background: var(--bg-dark); 
            z-index: 1000;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader-ring"></div>
        <p style="margin-top: 20px; letter-spacing: 1px; font-weight: 300;">INITIALIZING MAZEN ULTRA AI...</p>
    </div>

    <div id="welcome-msg">HI MAZEN! ✌️</div>

    <div class="ui-panel">
        <div id="status" style="color: var(--primary); font-weight: bold; font-size: 1.1rem;">جاري تفعيل الحواس...</div>
        <span class="thickness-label">سُمك الخط (اليد اليسرى 🤏):</span>
        <div class="thickness-indicator">
            <div id="thickness-bar"></div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn-action" onclick="clearCanvas()">مسح الشاشة</button>
        <button class="btn-action" style="background: var(--primary);" onclick="downloadImage()">حفظ اللوحة ✨</button>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script src="script.js"></script>

</body>
</html>
