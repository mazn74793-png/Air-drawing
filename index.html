<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mazen VFX Magic | مازن الخزعبلاتي</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --gold: #ffd700; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; filter: brightness(0.6); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; transform: scaleX(-1); }

        /* شاشة التعليمات */
        #tutorial {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; transition: 0.5s;
        }
        .step { margin: 15px; padding: 15px; border: 1px solid var(--neon); border-radius: 15px; width: 280px; }

        /* تأثيرات النصوص الخزعبلية */
        .vfx-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 5rem; font-weight: 900; z-index: 100; pointer-events: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .vfx-text.active { transform: translate(-50%, -50%) scale(1.2); text-shadow: 0 0 30px currentColor; }

        /* زر البدء */
        .start-btn {
            background: var(--neon); color: black; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px;
        }

        .hud {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; border-left: 4px solid var(--neon);
        }
    </style>
</head>
<body>

    <div id="tutorial">
        <h1 style="color: var(--neon);">أهلاً بك في عالم مازن VFX 🚀</h1>
        <div class="step">☝️ <b>إصبع واحد:</b> ارسم بنور النيون</div>
        <div class="step">✌️ <b>إصبعين (Peace):</b> ترحيب خزعبلاتي</div>
        <div class="step">🖐️ <b>كف كامل:</b> مسح الشاشة بالليزر</div>
        <div class="step">🤘 <b>علامة Rock:</b> وضع الـ Party 🌈</div>
        <button class="start-btn" onclick="startApp()">ابدأ السحر ✨</button>
    </div>

    <div id="vfx-container">
        <div id="msg-hi" class="vfx-text" style="color: var(--neon);">HI MAZEN! ✌️</div>
        <div id="msg-party" class="vfx-text" style="color: var(--pink);">PARTY TIME! 🤘</div>
    </div>

    <div class="hud">
        <div id="status">جاري التجهيز...</div>
        <div id="gesture-hint" style="font-size: 12px; margin-top: 5px; opacity: 0.7;">بانتظار حركات إيدك...</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status');

        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let hue = 0;
        let partyMode = false;

        function startApp() {
            document.getElementById('tutorial').style.opacity = '0';
            setTimeout(() => document.getElementById('tutorial').style.display = 'none', 500);
        }

        function init() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
        }
        window.addEventListener('resize', init);
        init();

        function showVFX(id) {
            const el = document.getElementById(id);
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 1500);
        }

        function onResults(results) {
            statusText.innerText = "النظام يعمل ✅";
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height, 0.1); // مسح خفيف لعمل تأثير "تلاشي"

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            const hand = results.multiHandLandmarks[0];
            const landmarks = hand;
            
            // الأصابع
            const indexUp = landmarks[8].y < landmarks[6].y;
            const middleUp = landmarks[12].y < landmarks[10].y;
            const ringUp = landmarks[16].y < landmarks[14].y;
            const pinkyUp = landmarks[20].y < landmarks[18].y;

            const x = landmarks[8].x * canvasElement.width;
            const y = landmarks[8].y * canvasElement.height;

            // 1. حالة "HI MAZEN" (السبابة والوسطى فقط)
            if (indexUp && middleUp && !ringUp && !pinkyUp) {
                showVFX('msg-hi');
                isDrawing = false;
            }
            // 2. حالة "Party Mode" (السبابة والخنصر مرفوعين - Rock Sign)
            else if (indexUp && pinkyUp && !middleUp && !ringUp) {
                showVFX('msg-party');
                partyMode = true;
                isDrawing = false;
            }
            // 3. حالة "المسح" (كل الأصابع مرفوعة)
            else if (indexUp && middleUp && ringUp && pinkyUp) {
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                isDrawing = false;
                partyMode = false;
            }
            // 4. حالة "الرسم" (السبابة فقط)
            else if (indexUp) {
                if (!isDrawing) { isDrawing = true; [lastX, lastY] = [x, y]; }
                
                hue = partyMode ? (hue + 10) % 360 : 190; // لو بارتي مود يغير ألوان
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
                canvasCtx.lineWidth = partyMode ? 15 : 6;
                canvasCtx.shadowBlur = 20;
                canvasCtx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                canvasCtx.moveTo(lastX, lastY);
                canvasCtx.lineTo(x, y);
                canvasCtx.stroke();
                [lastX, lastY] = [x, y];
            } else {
                isDrawing = false;
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480 // تقليل الجودة لزيادة السرعة
        });
        camera.start();
    </script>
</body>
</html>
