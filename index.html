<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAZEN ULTIMATE HUD | نسخة الوحش</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root { --neon: #00f2ff; --pink: #ff00ff; --yellow: #ffff00; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* الكاميرا بخلفية سينمائية */
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; filter: brightness(0.5) contrast(1.2) saturate(1.5); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 5; transform: scaleX(-1); pointer-events: none; }

        /* شاشة التحميل "الماتريكس" */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s ease-in-out;
        }
        .glitch { font-size: 3rem; font-weight: 900; color: var(--neon); text-transform: uppercase; position: relative; text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75); animation: glitch 500ms infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-5px, 5px); } 40% { transform: translate(-5px, -5px); } 60% { transform: translate(5px, 5px); } 80% { transform: translate(5px, -5px); } 100% { transform: translate(0); } }

        /* واجهة الـ HUD (البيانات اللي بتتحرك) */
        .hud-overlay { position: absolute; inset: 0; z-index: 10; pointer-events: none; border: 20px solid rgba(0, 242, 255, 0.05); }
        .corner { position: absolute; width: 50px; height: 50px; border: 4px solid var(--neon); }
        .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }
        
        .data-stream { position: absolute; top: 100px; left: 40px; color: var(--neon); font-size: 10px; line-height: 1.5; }
        
        /* عناصر تفاعلية (Cyber-Buttons) */
        .cyber-menu { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .cyber-btn {
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon);
            padding: 20px; border-radius: 5px; cursor: pointer; backdrop-filter: blur(10px);
            transition: 0.3s; text-align: center; font-size: 12px;
        }
        .cyber-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        /* الأجسام الطائرة (3D-like) */
        .floating-module {
            position: absolute; width: 120px; height: 120px; 
            border: 1px solid var(--pink); background: rgba(255, 0, 255, 0.05);
            z-index: 20; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 0 15px var(--pink); font-size: 9px; color: var(--pink);
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="glitch">MAZEN_QUANTUM_OS</div>
        <p style="color: var(--neon); margin-top: 20px;">LOADING NEURAL INTERFACE...</p>
        <button onclick="unlockSystem()" style="margin-top: 30px; background: none; border: 1px solid var(--neon); color: var(--neon); padding: 10px 30px; cursor: pointer;">BYPASS SECURITY</button>
    </div>

    <div class="hud-overlay">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>
        <div class="data-stream" id="stats">
            > SCANNING ENVIRONMENT...<br>
            > HAND_TRACKING: ACTIVE<br>
            > NEURAL_LINK: STABLE<br>
            > FPS: 60.00
        </div>
    </div>

    <div class="cyber-menu">
        <div class="cyber-btn active" id="mode-draw">NEON_DRAW</div>
        <div class="cyber-btn" id="mode-grab">OBJECT_GRAB</div>
        <div class="cyber-btn" id="mode-vfx">VFX_BURST</div>
    </div>

    <div id="obj1" class="floating-module" style="top: 20%; left: 20%;">[ CORE_ALPHA ]<br>STATUS: READY</div>
    <div id="obj2" class="floating-module" style="top: 20%; left: 70%; border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 15px var(--yellow);">[ CORE_BETA ]<br>STATUS: LOCKED</div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const objects = [document.getElementById('obj1'), document.getElementById('obj2')];
        
        let currentMode = 'DRAW'; // DRAW, GRAB, VFX
        let grabbedObj = null;
        let points = []; // للرسم المتطور
        let hue = 0;

        function unlockSystem() {
            document.getElementById('loading-screen').style.transform = 'translateY(-100%)';
        }

        function init() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', init);
        init();

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            updateStats();

            if (!results.multiHandLandmarks) return;

            results.multiHandLandmarks.forEach((landmarks, index) => {
                const isLeft = results.multiHandedness[index].label === "Left";
                const thumb = landmarks[4];
                const indexF = landmarks[8];
                const middle = landmarks[12];
                
                const x = (1 - indexF.x) * window.innerWidth;
                const y = indexF.y * window.innerHeight;

                // --- رسم دوائر تتبع حول الأصابع (زي الإنستا بالظبط) ---
                drawTracker(x, y);

                // --- منطق اليد اليسرى (تغيير المودات بحركة الأصابع) ---
                if (isLeft) {
                    if (indexF.y < landmarks[6].y && middle.y < landmarks[10].y) switchMode('GRAB');
                    else if (indexF.y < landmarks[6].y) switchMode('DRAW');
                }

                // --- منطق اليد اليمنى (التنفيذ) ---
                else {
                    if (currentMode === 'DRAW' && indexF.y < landmarks[6].y) {
                        renderNeonDraw(x, y);
                    } else if (currentMode === 'GRAB') {
                        const dist = Math.hypot(thumb.x - indexF.x, thumb.y - indexF.y);
                        if (dist < 0.06) handleGrab(x, y);
                        else releaseGrab();
                    }
                }
            });
        }

        function drawTracker(x, y) {
            canvasCtx.beginPath();
            canvasCtx.arc(x, y, 20, 0, Math.PI * 2);
            canvasCtx.strokeStyle = varColor();
            canvasCtx.lineWidth = 2;
            canvasCtx.stroke();
            // دائرة خارجية بتلف
            canvasCtx.beginPath();
            canvasCtx.arc(x, y, 30, hue/50, (hue/50) + 1);
            canvasCtx.stroke();
        }

        function renderNeonDraw(x, y) {
            hue = (hue + 2) % 360;
            points.push({x, y, color: `hsl(${hue}, 100%, 50%)`});
            if (points.length > 50) points.shift(); // الخط بيختفي تدريجياً (تأثير الليزر)

            for(let i=1; i<points.length; i++) {
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = points[i].color;
                canvasCtx.lineWidth = i/2;
                canvasCtx.shadowBlur = 10;
                canvasCtx.shadowColor = points[i].color;
                canvasCtx.moveTo(points[i-1].x, points[i-1].y);
                canvasCtx.lineTo(points[i].x, points[i].y);
                canvasCtx.stroke();
            }
        }

        function handleGrab(x, y) {
            objects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    grabbedObj = obj;
                    obj.style.borderColor = 'var(--neon)';
                    obj.style.boxShadow = '0 0 30px var(--neon)';
                }
            });
            if (grabbedObj) {
                grabbedObj.style.left = `${x - 60}px`;
                grabbedObj.style.top = `${y - 60}px`;
            }
        }

        function releaseGrab() {
            if (grabbedObj) {
                grabbedObj.style.borderColor = '';
                grabbedObj.style.boxShadow = '';
            }
            grabbedObj = null;
        }

        function switchMode(m) {
            currentMode = m;
            document.querySelectorAll('.cyber-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`mode-${m.toLowerCase()}`).classList.add('active');
        }

        function varColor() { return `hsl(${hue}, 100%, 50%)`; }

        function updateStats() {
            document.getElementById('stats').innerHTML = `> X: ${Math.floor(Math.random()*100)} Y: ${Math.floor(Math.random()*100)}<br>> MODE: ${currentMode}<br>> SYSTEM_VITAL: STABLE<br>> MAZEN_ID: DEV_747`;
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
