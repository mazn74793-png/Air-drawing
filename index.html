<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Drawing App - Pro Version</title>
    <link rel="stylesheet" href="style.css"> <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        /* كود الـ CSS اللي بعتهولك في الرد السابق يوضع هنا */
        body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; }
        #webcam { position:absolute; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        #canvas { position:absolute; width:100%; height:100%; transform:scaleX(-1); z-index:5; }
        .ui { position:absolute; top:20px; left:20px; z-index:10; background:rgba(0,0,0,0.6); color:#fff; padding:15px; border-radius:15px; backdrop-filter:blur(5px); border:1px solid rgba(255,255,255,0.1); }
        #loading { position:fixed; inset:0; background:#000; z-index:100; display:flex; justify-content:center; align-items:center; color:#fff; }
    </style>
</head>
<body>

    <div id="loading">جاري تحميل الذكاء الاصطناعي...</div>

    <div class="ui">
        <h2 id="mode-text">جاري التشغيل...</h2>
        <p>ارفع السبابة للرسم | كف مفتوح للمسح</p>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
