<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Paint Pro | Mazen Edition 🚀</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #70a1ff;
            --accent: #2ed573;
            --danger: #ff4757;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
        }

        /* حاوية الكاميرا واللوحة */
        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1);
        }

        /* رسالة الترحيب "Hi Mazen" */
        #welcome-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
            z-index: 100;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            text-align: center;
        }

        #welcome-msg.show {
            transform: translate(-50%, -50%) scale(1);
        }

        /* شريط الأدوات */
        .toolbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            transition: 0.3s;
        }

        .color-dot:active { transform: scale(1.3); }

        .btn-action {
            background: white;
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        /* حالة النظام */
        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 15px;
            border-right: 4px solid var(--primary);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="loading">جاري تشغيل الذكاء الاصطناعي... 🚀</div>
    <div id="welcome-msg">HI MAZEN! ✌️</div>

    <div class="status-bar">
        <div id="status-text" style="color: var(--primary); font-weight: bold;">انتظار اليد...</div>
        <small>ارفع السبابة للرسم | السبابة والوسطى للترحيب</small>
    </div>

    <div class="toolbar">
        <div class="color-dot" style="background: #00f2ff;" onclick="changeColor('#00f2ff')"></div>
        <div class="color-dot" style="background: #ff4757;" onclick="changeColor('#ff4757')"></div>
        <div class="color-dot" style="background: #2ed573;" onclick="changeColor('#2ed573')"></div>
        <div class="color-dot" style="background: #ffa502;" onclick="changeColor('#ffa502')"></div>
        <div style="width: 1px; height: 25px; background: rgba(255,255,255,0.3); margin: 0 5px;"></div>
        <button class="btn-action" onclick="clearCanvas()">مسح</button>
        <button class="btn-action" style="background: var(--primary);" onclick="downloadImage()">حفظ ✨</button>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status-text');
        const welcomeMsg = document.getElementById('welcome-msg');
        const loadingScreen = document.getElementById('loading');

        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentColor = '#00f2ff';

        function init() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            canvasCtx.shadowBlur = 8;
        }
        window.addEventListener('resize', init);
        init();

        function changeColor(color) { 
            currentColor = color; 
            canvasCtx.shadowColor = color;
        }

        function clearCanvas() { 
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height); 
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'mazen-air-art.png';
            link.href = canvasElement.toDataURL();
            link.click();
        }

        function onResults(results) {
            if (loadingScreen) loadingScreen.style.display = 'none';

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                welcomeMsg.classList.remove('show');
                statusText.innerText = "لا توجد يد في الكاميرا";
                return;
            }

            const hand = results.multiHandLandmarks[0];
            const indexTip = hand[8];   // طرف السبابة
            const indexBase = hand[5];  // قاعدة السبابة
            const middleTip = hand[12]; // طرف الوسطى
            const ringTip = hand[16];   // طرف البنصر
            const pinkyTip = hand[20];  // طرف الخنصر

            const x = indexTip.x * canvasElement.width;
            const y = indexTip.y * canvasElement.height;

            // --- اكتشاف الإيماءات ---
            const isIndexUp = indexTip.y < indexBase.y;
            const isMiddleUp = middleTip.y < hand[9].y;
            const isRingDown = ringTip.y > hand[14].y;
            const isPinkyDown = pinkyTip.y > hand[18].y;

            // 1. إيماءة السلام (Hi Mazen)
            if (isIndexUp && isMiddleUp && isRingDown && isPinkyDown) {
                welcomeMsg.classList.add('show');
                statusText.innerText = "أهلاً مازن! ✌️";
                isDrawing = false;
            } 
            // 2. وضع الرسم (السبابة فقط مرفوعة)
            else if (isIndexUp && !isMiddleUp) {
                welcomeMsg.classList.remove('show');
                statusText.innerText = "جاري الرسم ✎";
                
                if (!isDrawing) {
                    isDrawing = true;
                    [lastX, lastY] = [x, y];
                }

                canvasCtx.beginPath();
                canvasCtx.strokeStyle = currentColor;
                canvasCtx.lineWidth = 7;
                canvasCtx.moveTo(lastX, lastY);
                canvasCtx.lineTo(x, y);
                canvasCtx.stroke();
                [lastX, lastY] = [x, y];
            } 
            // 3. وضع الانتظار
            else {
                welcomeMsg.classList.remove('show');
                statusText.innerText = "وضع الانتظار";
                isDrawing = false;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
