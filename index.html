<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mazen Cyber-Interface</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; filter: brightness(0.4); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 5; transform: scaleX(-1); }

        /* شاشة البداية */
        #welcome-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s;
        }

        .cyber-card {
            border: 2px solid var(--neon); padding: 30px; border-radius: 20px;
            background: rgba(0, 242, 255, 0.05); text-align: center; box-shadow: 0 0 20px var(--neon);
        }

        /* مكعبات البيانات (تقدر تمسكها) */
        .data-cube {
            position: absolute; width: 80px; height: 80px; 
            border: 2px solid var(--neon); background: rgba(0, 242, 255, 0.1);
            z-index: 10; display: flex; justify-content: center; align-items: center;
            font-size: 10px; font-weight: bold; border-radius: 10px;
            box-shadow: 0 0 15px var(--neon); pointer-events: none;
        }

        .grabbing { border-color: var(--pink) !important; box-shadow: 0 0 30px var(--pink) !important; scale: 1.2; }

        .hud { position: absolute; top: 20px; right: 20px; z-index: 20; background: var(--glass); padding: 10px 20px; border-radius: 10px; border-right: 4px solid var(--neon); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div class="cyber-card">
            <h1 style="color: var(--neon);">MAZEN OS v3.0</h1>
            <p>1. ارفع السبابة للرسم ✍️</p>
            <p>2. قَرّب الإبهام والسبابة لتمسك المكعبات 🤏</p>
            <p>3. اليد الأخرى تغير الألوان تلقائياً 🌈</p>
            <button onclick="startSystem()" style="background: var(--neon); border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer;">تشغيل النظام</button>
        </div>
    </div>

    <div class="hud">SYSTEM STATUS: <span id="mode">WAITING...</span></div>

    <div id="cube1" class="data-cube" style="top: 30%; left: 30%;">CORE_01</div>
    <div id="cube2" class="data-cube" style="top: 50%; left: 60%; border-color: var(--pink); box-shadow: 0 0 15px var(--pink);">CORE_02</div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cubes = [document.getElementById('cube1'), document.getElementById('cube2')];
        
        let grabbedCube = null;
        let isDrawing = false;
        let lastX, lastY;

        function startSystem() {
            document.getElementById('welcome-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('welcome-overlay').style.display = 'none', 800);
        }

        function init() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', init);
        init();

        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (!results.multiHandLandmarks) return;

            results.multiHandLandmarks.forEach((landmarks, index) => {
                const thumb = landmarks[4];
                const indexF = landmarks[8];
                
                // تحويل الإحداثيات للشاشة (Mirroring)
                const x = (1 - indexF.x) * window.innerWidth;
                const y = indexF.y * window.innerHeight;

                // حساب المسافة بين الإبهام والسبابة (للإمساك)
                const distance = Math.hypot(thumb.x - indexF.x, thumb.y - indexF.y);

                // 1. ميزة الإمساك (Grab) - لو المسافة صغيرة جداً
                if (distance < 0.05) {
                    document.getElementById('mode').innerText = "GRABBING MODE";
                    checkGrab(x, y);
                } else {
                    releaseGrab();
                    // 2. ميزة الرسم (لو السبابة مرفوعة والمسافة كبيرة)
                    if (indexF.y < landmarks[6].y) {
                        document.getElementById('mode').innerText = "DRAWING MODE";
                        draw(x, y);
                    } else {
                        isDrawing = false;
                        document.getElementById('mode').innerText = "SCANNING...";
                    }
                }
            });
        }

        function draw(x, y) {
            if (!isDrawing) { isDrawing = true; [lastX, lastY] = [x, y]; }
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = '#00f2ff';
            canvasCtx.lineWidth = 5;
            canvasCtx.shadowBlur = 15;
            canvasCtx.shadowColor = '#00f2ff';
            canvasCtx.moveTo(lastX, lastY);
            canvasCtx.lineTo(x, y);
            canvasCtx.stroke();
            [lastX, lastY] = [x, y];
        }

        function checkGrab(x, y) {
            cubes.forEach(cube => {
                const rect = cube.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    grabbedCube = cube;
                    cube.classList.add('grabbing');
                }
            });

            if (grabbedCube) {
                grabbedCube.style.left = `${x - 40}px`;
                grabbedCube.style.top = `${y - 40}px`;
            }
        }

        function releaseGrab() {
            if (grabbedCube) grabbedCube.classList.remove('grabbing');
            grabbedCube = null;
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
