<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Paint Pro | مازن المطور</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; transform: scaleX(-1); }

        /* واجهة المستخدم */
        .toolbar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
        }

        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid white; transition: 0.3s; }
        .color-dot:hover { transform: scale(1.2); }

        .btn-action {
            background: white; color: black; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        .status-tag {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: var(--primary); color: black; padding: 8px 20px;
            border-radius: 10px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,242,255,0.4);
        }
    </style>
</head>
<body>

    <div class="status-tag" id="status">جاري التحميل...</div>

    <div class="toolbar">
        <div class="color-dot" style="background: #00f2ff;" onclick="changeColor('#00f2ff')"></div>
        <div class="color-dot" style="background: #ff4757;" onclick="changeColor('#ff4757')"></div>
        <div class="color-dot" style="background: #2ed573;" onclick="changeColor('#2ed573')"></div>
        <div class="color-dot" style="background: #ffa502;" onclick="changeColor('#ffa502')"></div>
        <button class="btn-action" onclick="clearCanvas()">مسح الكل</button>
        <button class="btn-action" style="background: #00f2ff;" onclick="downloadImage()">حفظ ✨</button>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusTag = document.getElementById('status');

        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentColor = '#00f2ff';

        function init() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            canvasCtx.shadowBlur = 5;
        }
        window.addEventListener('resize', init);
        init();

        function changeColor(color) { 
            currentColor = color; 
            canvasCtx.shadowColor = color;
        }

        function clearCanvas() { canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height); }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'my-air-drawing.png';
            link.href = canvasElement.toDataURL();
            link.click();
        }

        function onResults(results) {
            statusTag.innerText = "جاهز للرسم 🎨";
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            const hand = results.multiHandLandmarks[0];
            const indexTip = hand[8];
            const indexBase = hand[5];
            const middleTip = hand[12];

            const x = indexTip.x * canvasElement.width;
            const y = indexTip.y * canvasElement.height;

            // لو السبابة والوسطى مرفوعين = وضع السكون (نقل القلم بدون رسم)
            if (indexTip.y < indexBase.y && middleTip.y < hand[9].y) {
                isDrawing = false;
                statusTag.innerText = "وضعية التحريك (بدون رسم)";
                statusTag.style.background = "#ffa502";
            } 
            // لو السبابة بس مرفوع = رسم
            else if (indexTip.y < indexBase.y) {
                statusTag.style.background = "#00f2ff";
                if (!isDrawing) {
                    isDrawing = true;
                    [lastX, lastY] = [x, y];
                }
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = currentColor;
                canvasCtx.lineWidth = 8;
                canvasCtx.moveTo(lastX, lastY);
                canvasCtx.lineTo(x, y);
                canvasCtx.stroke();
                [lastX, lastY] = [x, y];
            } else {
                isDrawing = false;
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
