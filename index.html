<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الرسم في الهواء</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; display: flex; justify-content: center; align-items: center; }
        .container { position: relative; width: 100vw; height: 100vh; }
        
        /* جعل الفيديو يملأ الشاشة وخلف اللوحة */
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* عكس الكاميرا كأنها مرآة */ }
        
        /* لوحة الرسم فوق الفيديو */
        #canvas { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); }
        
        .controls { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 10px; font-family: sans-serif; z-index: 10; }
    </style>
</head>
<body>

    <div class="controls">
        <h3>تحكم الرسم</h3>
        <ul>
            <li>إصبع السبابة: رسم</li>
            <li>كف اليد مفتوح: مسح</li>
        </ul>
    </div>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script src="script.js"></script>
</body>
</html>
