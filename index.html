<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirCanvas Ultra V3 | ميزو فيجن</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --neon: #00f2fe;
            --accent: #ff007f;
            --glass: rgba(5, 10, 20, 0.8);
            --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #010409; color: white;
            font-family: var(--font); user-select: none;
        }

        /* حاوية التطبيق */
        .app-view {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* الكاميرا وطبقات الرسم */
        video, #output_canvas, #paint_canvas {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1); /* تأثير المرآة */
            border-radius: 20px;
        }

        /* HUD - واجهة المستخدم طائرة */
        .hud-overlay {
            position: absolute; width: 95%; height: 90%;
            pointer-events: none; z-index: 100;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* شريط علوي HUD */
        .hud-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px;
        }

        .system-title {
            font-size: 20px; font-weight: bold; color: var(--neon);
            text-shadow: 0 0 15px var(--neon); letter-spacing: 2px;
        }

        /* عناصر قابلة للتحريك (UI Elements) */
        .draggable-ui {
            pointer-events: auto; /* السماح بالتفاعل */
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: box-shadow 0.3s, transform 0.1s;
        }

        /* شريط الألوان القابل للتحريك */
        .color-bar {
            position: absolute; top: 100px; left: 50px; /* مكان أولي */
            padding: 15px; display: flex; gap: 12px; flex-direction: column;
            cursor: grab;
        }

        .color-bar.dragging { cursor: grabbing; box-shadow: 0 0 30px var(--neon); opacity: 0.8; }

        .dot { 
            width: 35px; height: 35px; border-radius: 10px; 
            cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .dot.active { transform: scale(1.2); border-color: white; box-shadow: 0 0 15px currentColor; }

        /* الأزرار في الأسفل */
        .hud-footer {
            display: flex; justify-content: center; padding: 20px; gap: 20px;
        }

        .action-btn {
            pointer-events: auto; background: var(--glass);
            color: #ccc; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 30px; border-radius: 10px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { color: white; border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* الكرسور الذكي */
        #smart-cursor {
            position: absolute; width: 40px; height: 40px;
            border: 2px solid var(--neon); border-radius: 50%;
            pointer-events: none; z-index: 1000;
            display: none; box-shadow: 0 0 20px var(--neon);
            mix-blend-mode: difference;
            transition: width 0.2s, height 0.2s, background 0.2s, border-radius 0.2s;
        }

        /* أنيميشن التحميل */
        #loader {
            position: fixed; inset: 0; background: #010409;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; flex-direction: column; gap: 20px;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(0,242,254,0.1); border-top-color: var(--neon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="color: var(--neon); letter-spacing: 2px;">MIZOO VISION AI</div>
    </div>

    <div class="app-view">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="paint_canvas"></canvas> <canvas id="output_canvas"></canvas> <div id="smart-cursor"></div>

        <div class="hud-overlay">
            <div class="hud-header">
                <div class="system-title">AIR CANVAS <span style="font-size:12px; color:#555">ULTRA V3</span></div>
                <div id="mode-badge" style="background:var(-- glass); padding:8px 15px; border-radius:10px; font-size:12px; color:var(--accent); border:1px solid var(--accent);">جاري التحميل...</div>
            </div>

            <div id="color-bar" class="draggable-ui color-bar">
                <div class="dot active" style="background: #00f2fe; color: #00f2fe" onclick="changeColor('#00f2fe', this)"></div>
                <div class="dot" style="background: #ff007f; color: #ff007f" onclick="changeColor('#ff007f', this)"></div>
                <div class="dot" style="background: #00ff88; color: #00ff88" onclick="changeColor('#00ff88', this)"></div>
                <div class="dot" style="background: #ffffff; color: #ffffff" onclick="changeColor('#ffffff', this)"></div>
            </div>

            <div class="hud-footer">
                <button class="action-btn" onclick="clearCanvas()">مسح الشاشة</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        const video = document.getElementById("webcam");
        const outCanvas = document.getElementById("output_canvas");
        const outCtx = outCanvas.getContext("2d");
        const paintCanvas = document.getElementById("paint_canvas");
        const paintCtx = paintCanvas.getContext("2d");
        
        // عناصر الـ UI
        const smartCursor = document.getElementById("smart-cursor");
        const colorBar = document.getElementById("color-bar");
        const modeBadge = document.getElementById("mode-badge");

        let handLandmarker;
        let lastVideoTime = -1;
        let currentColor = "#00f2fe";
        let lastPaintX, lastPaintY;
        
        // متغيرات الجزيئات (Particles)
        let particles = [];

        // متغيرات الإمساك والتحريك (UI Dragging)
        let draggedElement = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        async function init() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                startCamera();
            } catch (e) { alert("فشل تحميل الذكاء الاصطناعي. تأكد من إذن الكاميرا."); }
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                paintCanvas.width = outCanvas.width = video.videoWidth;
                paintCanvas.height = outCanvas.height = video.videoHeight;
                document.getElementById("loader").style.display = "none";
                modeBadge.innerText = "جاهز 👋";
                modeBadge.style.borderColor = "#00ff88"; modeBadge.style.color = "#00ff88";
                render();
            });
        }

        // --- وظائف الـ UI الأصلية ---
        window.changeColor = (color, el) => {
            currentColor = color;
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            smartCursor.style.borderColor = color;
            smartCursor.style.boxShadow = `0 0 20px ${color}`;
        };

        window.clearCanvas = () => paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);

        // --- إدارة الجزيئات (Visual FX) ---
        function createParticles(x, y, color) {
            for(let i=0; i<3; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3,
                    life: 20, color: color, size: Math.random() * 3 + 1
                });
            }
        }

        function updateParticles() {
            outCtx.save();
            outCtx.globalCompositeOperation = "lighter";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--; p.size *= 0.97;
                outCtx.fillStyle = p.color;
                outCtx.opacity = p.life / 20;
                outCtx.beginPath(); outCtx.arc(p.x, p.y, Math.max(0, p.size), 0, Math.PI*2); outCtx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            outCtx.restore();
        }

        // --- الحلقة الأساسية (Render Loop) ---
        function render() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height);
                updateParticles(); // رسم الجزيئات

                smartCursor.style.display = "none"; // إخفاء مبدئي

                if (results.landmarks && results.landmarks.length > 0) {
                    const marks = results.landmarks[0];
                    const index = marks[8]; // السبابة
                    const thumb = marks[4]; // الإبهام
                    
                    // الإحداثيات الحقيقية على الشاشة (لـ HUD)
                    const screenX = (1 - index.x) * window.innerWidth;
                    const screenY = index.y * window.innerHeight;
                    
                    // الإحداثيات على الكانفاس (للرسوم)
                    const canvasX = index.x * paintCanvas.width;
                    const canvasY = index.y * paintCanvas.height;

                    // 1. تحديث وتحريك الكرسور الذكي
                    smartCursor.style.display = "block";
                    smartCursor.style.left = `${screenX}px`;
                    smartCursor.style.top = `${screenY}px`;
                    createParticles(canvasX, canvasY, currentColor); // جزيئات خلف الكرسور

                    // إعدادات وضع الرسم
                    paintCtx.lineWidth = 10; paintCtx.lineCap = "round"; paintCtx.shadowBlur = 15; paintCtx.shadowColor = currentColor; paintCtx.strokeStyle = currentColor;

                    // 2. تحديد وضع الإيد (Gesture Detection)
                    const isIndexUp = index.y < marks[6].y;
                    const isMiddleUp = marks[12].y < marks[10].y;
                    const pinchDist = Math.hypot(index.x - thumb.x, index.y - thumb.y);

                    // وضع المسح ✋ (كف مفتوح)
                    if (isIndexUp && isMiddleUp && marks[16].y < marks[14].y) {
                        setCursorState("eraser");
                        paintCtx.clearRect(canvasX - 40, canvasY - 40, 80, 80);
                        lastPaintX = null; lastPaintY = null;
                    } 
                    // وضع الرسم ☝️ (صباع واحد مرفوع)
                    else if (isIndexUp && !isMiddleUp) {
                        setCursorState("draw");
                        if (lastPaintX) {
                            paintCtx.beginPath(); paintCtx.moveTo(lastPaintX, lastPaintY); paintCtx.lineTo(canvasX, canvasY); paintCtx.stroke();
                        }
                        lastPaintX = canvasX; lastPaintY = canvasY;
                    } 
                    // وضع الإمساك والتحريك 🤏 (Pinch)
                    else if (pinchDist < 0.04) {
                        setCursorState("grab");
                        handleUIDrag(screenX, screenY); // التعامل مع سحب العناصر
                        lastPaintX = null; lastPaintY = null;
                    }
                    // وضع الانتظار
                    else {
                        setCursorState("default");
                        releaseUIDrag(); // ترك العناصر
                        lastPaintX = null; lastPaintY = null;
                    }
                } else { releaseUIDrag(); } // إذا اختفت الإيد، اترك العنصر
            }
            requestAnimationFrame(render);
        }

        // --- وظائف مساعدة جديدة للجمدان ---

        // تغيير شكل الكرسور بناءً على الحالة
        function setCursorState(state) {
            switch(state) {
                case "draw":
                    smartCursor.style.width = "20px"; smartCursor.style.height = "20px"; smartCursor.style.borderRadius = "5px"; smartCursor.style.background = currentColor; break;
                case "grab":
                    smartCursor.style.width = "50px"; smartCursor.style.height = "50px"; smartCursor.style.borderRadius = "50%"; smartCursor.style.background = "rgba(255,255,0,0.5)"; break;
                case "eraser":
                    smartCursor.style.width = "60px"; smartCursor.style.height = "60px"; smartCursor.style.borderRadius = "10px"; smartCursor.style.background = "rgba(255,0,0,0.5)"; break;
                default:
                    smartCursor.style.width = "40px"; smartCursor.style.height = "40px"; smartCursor.style.borderRadius = "50%"; smartCursor.style.background = "none";
            }
        }

        // منطق إمساك وتحريك الـ UI (Pinch to Drag)
        function handleUIDrag(x, y) {
            if (!draggedElement) {
                // هل نحن فوق شريط الألوان؟
                const rect = colorBar.getBoundingClientRect();
                if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
                    draggedElement = colorBar;
                    dragOffsetX = x - rect.left;
                    dragOffsetY = y - rect.top;
                    colorBar.classList.add("dragging");
                }
            } else {
                // تحريك العنصر الممسوك
                draggedElement.style.left = `${x - dragOffsetX}px`;
                draggedElement.style.top = `${y - dragOffsetY}px`;
            }
        }

        function releaseUIDrag() {
            if (draggedElement) {
                draggedElement.classList.remove("dragging");
                draggedElement = null;
            }
        }

        init();
    </script>
</body>
</html>
